name: Update Exam Dashboard

on:
  push:
    branches: [main]
    paths:
      - exams.html
      - .github/workflows/update-exam-dashboard.yml
  repository_dispatch:
    types: [exam-date-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify-stub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify public exam dashboard is only a moved stub
        run: |
          grep -q 'https://internal.mechanicalpeexamprep.com/exams/' exams.html
          ! grep -Eiq 'mailto:|TYPEFORM_TOKEN|KIT_API_SECRET|exam_date|student|email' exams.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: verify-stub
    runs-on: ubuntu-latest
    concurrency:
      group: mpep-pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
