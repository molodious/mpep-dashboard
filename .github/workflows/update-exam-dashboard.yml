name: Update Exam Dashboard

on:
  push:
    branches: [main]
    paths:
      - build_exam_page.py
      - exam-dashboard-overrides.json
      - exams-template.html
  repository_dispatch:
    types: [exam-date-updated]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Build exam dashboard
        env:
          TYPEFORM_TOKEN: ${{ secrets.TYPEFORM_TOKEN }}
          KIT_API_SECRET: ${{ secrets.KIT_API_SECRET }}
        run: |
          rc=0
          python build_exam_page.py || rc=$?
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 1 ]; then
            echo "build_exam_page.py exited $rc (exit 1 = skipped submissions, not a failure)"
            exit 0
          else
            echo "build_exam_page.py exited $rc — real failure"
            exit "$rc"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exams.html
          if git diff --cached --quiet; then
            echo "No changes to exams.html"
          else
            git commit -m "Auto-update exam dashboard [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ Exam dashboard rebuild failed. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy:
    needs: rebuild
    runs-on: ubuntu-latest
    concurrency:
      group: mpep-pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
