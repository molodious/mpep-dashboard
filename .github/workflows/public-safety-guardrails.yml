name: Public Dashboard Safety Guardrails

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify public dashboard safety
        run: bash scripts/verify-public-safety.sh
