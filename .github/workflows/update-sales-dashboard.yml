name: Update Sales Dashboard

on:
  push:
    branches: [main]
    paths:
      - build_sales_dashboard.py
  repository_dispatch:
    types: [new-order]
  workflow_dispatch: # Manual trigger from GitHub UI

concurrency:
  group: sales-dashboard
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Build sales dashboard
        env:
          STRIPE_READONLY_KEY: ${{ secrets.STRIPE_READONLY_KEY }}
          THINKIFIC_API_KEY: ${{ secrets.THINKIFIC_API_KEY }}
        run: python build_sales_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales.html
          if git diff --cached --quiet; then
            echo "No changes to sales.html"
          else
            git commit -m "Auto-update sales dashboard [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: rebuild
    runs-on: ubuntu-latest
    concurrency:
      group: mpep-pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
