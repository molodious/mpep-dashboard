name: Update Legacy Sales Dashboard

on:
  # The production sales dashboard is now API-backed and does not use this
  # legacy static rebuild path. Keep this workflow available only for manual
  # rollback/reference maintenance so order webhooks cannot overwrite sales.html.
  workflow_dispatch:

concurrency:
  group: sales-dashboard
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Build legacy sales dashboard
        env:
          STRIPE_READONLY_KEY: ${{ secrets.STRIPE_READONLY_KEY }}
          THINKIFIC_API_KEY: ${{ secrets.THINKIFIC_API_KEY }}
        run: |
          python build_sales_dashboard.py
          mv sales.html sales-legacy.html
          git checkout -- sales.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sales-legacy.html
          if git diff --cached --quiet; then
            echo "No changes to sales-legacy.html"
          else
            git commit -m "Auto-update legacy sales dashboard [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: rebuild
    runs-on: ubuntu-latest
    concurrency:
      group: mpep-pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
