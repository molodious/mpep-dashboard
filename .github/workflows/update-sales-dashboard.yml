name: Verify Retired Sales Dashboard

on:
  # The sales dashboard is now hosted behind server-side auth at
  # internal.mechanicalpeexamprep.com/sales/. This workflow is intentionally
  # manual-only and verifies that public sales pages remain moved stubs.
  workflow_dispatch:

concurrency:
  group: sales-dashboard
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify public sales pages are moved stubs
        run: |
          set -euo pipefail
          for file in sales.html sales-v2-staging.html sales-legacy.html; do
            grep -q 'https://internal.mechanicalpeexamprep.com/sales/' "$file"
            if grep -Eq 'sales-v2-staging|orders-log\?secret=|auth\.js|id="auth-overlay"' "$file"; then
              echo "$file still contains retired public sales dashboard logic"
              exit 1
            fi
          done
