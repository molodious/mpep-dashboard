name: Rebuild Cron Dashboard

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Source of trigger (manual or scheduled)'
        required: false
        default: 'manual'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run cron dashboard builder
        run: |
          cd ../..
          python3 scripts/build_cron_dashboard.py

      - name: Commit and push
        run: |
          cd projects/mpep-dashboard
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cron.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "On-demand rebuild: cron dashboard [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
            git push origin main
          fi

      - name: Report status
        run: |
          echo "✅ Cron dashboard rebuild complete"
