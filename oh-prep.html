<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OH Prep Dashboard — Problem Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 28px; margin-bottom: 12px; }
        .header p { color: #666; line-height: 1.6; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .stat {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            border-left: 4px solid #0066cc;
        }
        .stat-number { font-size: 24px; font-weight: 700; color: #0066cc; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; text-transform: uppercase; }
        .problems {
            max-width: 1200px;
            margin: 0 auto;
        }
        .chapter {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chapter-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .problem {
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .problem:hover { transform: translateY(-2px); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .green { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .amber { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .red { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
        .timestamp { color: #999; font-size: 12px; margin-top: 20px; }
        .program-title {
            margin-top: 30px;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 OH Prep Dashboard</h1>
        <p><strong id="title-total">Loading...</strong> | <span id="title-timestamp">Syncing</span></p>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="stat-total">—</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" style="color: #10b981;" id="stat-green">—</div>
                <div class="stat-label">Green (1-5)</div>
            </div>
            <div class="stat">
                <div class="stat-number" style="color: #f59e0b;" id="stat-amber">—</div>
                <div class="stat-label">Amber (6+)</div>
            </div>
            <div class="stat">
                <div class="stat-number" style="color: #ef4444;" id="stat-remaining">—</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>
    </div>

    <div class="problems" id="problems-container">
        <p style="text-align: center; color: #999; padding: 40px;">Loading problems...</p>
    </div>

    <div style='max-width: 1200px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px;'>
        <p style='color: #666; font-size: 13px;'>
            <strong>Status legend:</strong>
            <span style='background: #d1fae5; padding: 2px 8px; border-radius: 3px; margin: 0 4px;'>🟢 Green (Problems 1-5, approved)</span>
            <span style='background: #fef3c7; padding: 2px 8px; border-radius: 3px; margin: 0 4px;'>🟡 Amber (Problems 6+, built)</span>
            <span style='background: #fee2e2; padding: 2px 8px; border-radius: 3px; margin: 0 4px;'>🔴 Red (Not started)</span>
        </p>
        <p style='color: #999; font-size: 12px; margin-top: 10px;'>
            Updates every problem. Last sync: <span id="footer-timestamp">syncing...</span>
        </p>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // Fetch problem-status.json
                const response = await fetch('problem-status.json');
                const data = await response.json();
                
                const total = data.total || 0;
                const green = data.green || 0;
                const amber = data.amber || 0;
                const remaining = 660 - total;
                
                // Update header stats
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-green').textContent = green;
                document.getElementById('stat-amber').textContent = amber;
                document.getElementById('stat-remaining').textContent = remaining;
                document.getElementById('title-total').textContent = `${total}/660 problems built`;
                
                const timestamp = new Date().toLocaleString('en-US', { 
                    timeZone: 'America/New_York',
                    month: 'short',
                    day: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
                document.getElementById('title-timestamp').textContent = `Last updated: ${timestamp}`;
                document.getElementById('footer-timestamp').textContent = timestamp;
                
                // Group problems by program and chapter
                const byProgram = {};
                Object.entries(data.problems || {}).forEach(([key, prob]) => {
                    if (!byProgram[prob.program]) {
                        byProgram[prob.program] = {};
                    }
                    if (!byProgram[prob.program][prob.chapter]) {
                        byProgram[prob.program][prob.chapter] = [];
                    }
                    byProgram[prob.program][prob.chapter].push(prob);
                });
                
                // Build HTML
                let html = '';
                Object.keys(byProgram).sort().forEach(program => {
                    html += `<div class="program-title">${program}</div>`;
                    
                    Object.keys(byProgram[program]).sort().forEach(chapter => {
                        const problems = byProgram[program][chapter].sort((a, b) => a.number - b.number);
                        html += `
                        <div class="chapter">
                            <div class="chapter-title">${chapter}</div>
                            <div class="problem-grid">
                        `;
                        problems.forEach(prob => {
                            html += `<div class="problem ${prob.status}" title="${prob.program}-${prob.chapter}-${prob.number}">${prob.number}</div>`;
                        });
                        html += `
                            </div>
                        </div>
                        `;
                    });
                });
                
                document.getElementById('problems-container').innerHTML = html;
                
                // Auto-refresh every 30 seconds
                setTimeout(loadDashboard, 30000);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('problems-container').innerHTML = 
                    `<p style="text-align: center; color: #e74c3c; padding: 40px;">Error loading data: ${error.message}</p>`;
                setTimeout(loadDashboard, 5000);
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
