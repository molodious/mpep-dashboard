<!DOCTYPE html>
<html lang="en">
<head>

  <title>Student Exam Dates — MPEP Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #21262d;
      --blue: #58a6ff;
      --green: #3fb950;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .timestamp {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--surface);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .date {
      font-weight: 500;
      color: var(--green);
    }
    .days-away {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

    function daysUntil(dateStr) {
      const exam = new Date(dateStr + 'T00:00:00Z');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = exam - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }
    
    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split('-');
      return new Date(year, month - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    const tbody = document.getElementById('exam-table');
    students.forEach(s => {
      const days = daysUntil(s.date);
      const row = `<tr>
        <td>${s.name || 'Unknown'}</td>
        <td><a href="mailto:${s.email}" style="color: var(--blue); text-decoration: none;">${s.email}</a></td>
        <td class="date">${formatDate(s.date)}</td>
        <td class="days-away">${days} days</td>
      </tr>`;
      tbody.innerHTML += row;
    });
