<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPEP Accountable Plan</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#1c2330; --border:#21262d;
      --border2:#30363d; --text:#e6edf3; --muted:#8b949e; --dim:#6e7681;
      --blue:#58a6ff; --green:#3fb950; --purple:#a371f7; --yellow:#e3b341; --red:#f85149;
    }
    html { min-height:100%; overflow-x:hidden; overflow-y:scroll; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    #auth-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .auth-box { background:var(--surface); border:1px solid var(--border2); border-radius:14px; padding:40px 36px; width:100%; max-width:380px; text-align:center; }
    .auth-logo { font-size:36px; margin-bottom:12px; }
    .auth-title { font-size:20px; font-weight:700; margin-bottom:4px; }
    .auth-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }
    .auth-box input { width:100%; background:var(--bg); border:1px solid var(--border2); color:var(--text); border-radius:8px; padding:11px 14px; font-size:15px; margin-bottom:12px; outline:none; }
    .auth-box input:focus { border-color:var(--blue); }
    .auth-box button { width:100%; background:var(--blue); color:var(--bg); border:0; border-radius:8px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; }
    #pwd-error { display:none; color:var(--red); font-size:12px; margin-bottom:10px; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 32px; }
    .header-inner { max-width:1480px; margin:auto; display:flex; align-items:center; justify-content:space-between; gap:18px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-icon { font-size:28px; }
    .brand-name { font-size:18px; font-weight:700; }
    .header-actions { display:flex; align-items:center; gap:8px; }
    .nav-link, button.secondary { color:var(--muted); text-decoration:none; border:1px solid var(--border2); border-radius:6px; padding:7px 11px; font-size:12px; white-space:nowrap; background:transparent; cursor:pointer; }
    .nav-link:hover, button.secondary:hover { color:var(--blue); border-color:var(--blue); }
    main { max-width:1480px; margin:auto; padding:28px 24px 64px; }
    .top-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
    .kpi { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; min-width:0; }
    .kpi-label { color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-size:10px; font-weight:700; margin-bottom:8px; }
    .kpi-value { font-size:24px; line-height:1.1; font-weight:750; }
    .kpi-note { color:var(--muted); font-size:11px; margin-top:7px; }
    section { margin-top:34px; }
    .section-heading { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:15px; }
    .section-title { display:flex; align-items:center; gap:11px; }
    .section-number { width:25px; height:25px; display:grid; place-items:center; border-radius:7px; color:var(--blue); background:rgba(88,166,255,.1); font-size:12px; font-weight:700; }
    h2 { font-size:18px; }
    .table-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .table-scroll { overflow-x:auto; }
    table { width:100%; min-width:1180px; border-collapse:separate; border-spacing:0; font-size:12px; font-variant-numeric:tabular-nums; }
    th { background:var(--surface2); color:var(--muted); text-transform:uppercase; letter-spacing:.01em; font-size:11px; text-align:right; padding:10px 8px; border-bottom:1px solid var(--border2); }
    th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:var(--surface); z-index:1; }
    th:first-child { background:var(--surface2); z-index:2; }
    td { color:var(--text); text-align:right; padding:10px 8px; border-bottom:1px solid var(--border); white-space:nowrap; }
    tbody tr:last-child td { border-bottom:0; }
    tbody tr.current td { background:rgba(88,166,255,.08); }
    .total { font-weight:750; color:var(--green); }
    .pending { color:var(--yellow); font-size:11px; }
    .data-error { display:none; background:rgba(248,81,73,.08); border:1px solid rgba(248,81,73,.35); color:#ffb4af; border-radius:12px; padding:18px; line-height:1.5; }
    .report { display:none; background:#fff; color:#111; border-radius:8px; padding:24px; margin-top:18px; font-size:12px; line-height:1.35; }
    .report h1 { font-size:18px; margin-bottom:4px; }
    .report h2 { color:#111; font-size:13px; margin:14px 0 6px; }
    .report table { min-width:0; font-size:11px; border-collapse:collapse; }
    .report th, .report td { color:#111; background:#fff; border-bottom:1px solid #ddd; padding:4px 6px; text-align:left; position:static; }
    .report .money { text-align:right; }
    footer { color:var(--dim); text-align:center; font-size:11px; margin-top:48px; }
    @media (max-width:900px) { .top-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:620px) { header { padding:15px 16px; } main { padding:24px 14px 48px; } .top-grid { grid-template-columns:1fr 1fr; gap:8px; } .kpi { padding:14px; } .kpi-value { font-size:20px; } .header-actions .nav-link:first-child { display:none; } }
    @media print {
      body { background:#fff; color:#111; }
      #auth-overlay, header, main > :not(#report), footer { display:none !important; }
      #main-content, main, #report { display:block !important; padding:0; margin:0; }
      .report { box-shadow:none; border-radius:0; }
    }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <form class="auth-box" id="auth-form">
      <div class="auth-logo">🧾</div>
      <div class="auth-title">MPEP Accountable Plan</div>
      <div class="auth-sub">Enter the dashboard password to continue</div>
      <input type="password" id="pwd-input" placeholder="Password" autocomplete="current-password">
      <div id="pwd-error">Incorrect password</div>
      <button id="pwd-btn" type="submit">Continue</button>
    </form>
  </div>

  <div id="main-content" style="display:none">
    <header>
      <div class="header-inner">
        <div class="brand"><div class="brand-icon">🧾</div><div class="brand-name">MPEP Accountable Plan</div></div>
        <div class="header-actions"><a class="nav-link" href="financial.html">Financials</a><a class="nav-link" href="index.html">← Main dashboard</a></div>
      </div>
    </header>
    <main>
      <div class="data-error" id="dataError"></div>
      <div id="dashboardBody">
        <div class="top-grid">
          <div class="kpi"><div class="kpi-label">Current month</div><div class="kpi-value" id="currentMonthTotal"></div><div class="kpi-note" id="currentMonthLabel"></div></div>
          <div class="kpi"><div class="kpi-label">Business use</div><div class="kpi-value" id="businessUse"></div><div class="kpi-note" id="squareFeet"></div></div>
          <div class="kpi"><div class="kpi-label">Mileage rate</div><div class="kpi-value" id="mileageRate"></div><div class="kpi-note">IRS standard rate in settings</div></div>
          <div class="kpi"><div class="kpi-label">Logged months</div><div class="kpi-value" id="loggedMonths"></div><div class="kpi-note" id="latestMonth"></div></div>
        </div>

        <section>
          <div class="section-heading">
            <div class="section-title"><span class="section-number">1</span><h2>Monthly reimbursement totals</h2></div>
            <button class="secondary" type="button" onclick="printCurrentReport()">Print current report</button>
          </div>
          <div class="table-card"><div class="table-scroll"><table><thead id="summaryHead"></thead><tbody id="summaryBody"></tbody></table></div></div>
        </section>
      </div>
      <div class="report" id="report"></div>
      <footer id="dataFooter">Loading live accountable plan data…</footer>
    </main>
  </div>
  <script>
    const API = location.hostname === '127.0.0.1' || location.hostname === 'localhost'
      ? '/accountable-plan'
      : 'https://btc.mechanicalpeexamprep.com/accountable-plan';
    const money = new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2, maximumFractionDigits:2 });
    const wholeMoney = new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 });
    const monthLabel = month => new Date(`${month}-02T12:00:00Z`).toLocaleDateString('en-US', { month:'short', year:'numeric', timeZone:'UTC' });
    const currentMonth = new Date().toISOString().slice(0, 7);
    let state = null;

    async function onAuthenticated() {
      try {
        const response = await fetch(API, { cache:'no-store' });
        if (!response.ok) throw new Error(`API returned ${response.status}`);
        state = await response.json();
        renderDashboard(state);
      } catch (err) {
        const errorBox = document.getElementById('dataError');
        errorBox.textContent = `Accountable plan data could not be loaded. ${err.message}. Please try refreshing the page.`;
        errorBox.style.display = 'block';
        document.getElementById('dashboardBody').style.display = 'none';
        document.getElementById('dataFooter').textContent = 'Live data unavailable';
      }
    }

    function renderDashboard(data) {
      const months = data.months || [];
      const settings = data.settings || {};
      const current = months.find(row => row.month === currentMonth) || months.at(-1) || null;
      document.getElementById('currentMonthTotal').textContent = current ? wholeMoney.format(current.total_reimbursement) : '$0';
      document.getElementById('currentMonthLabel').textContent = current ? monthLabel(current.month) : 'No entries yet';
      document.getElementById('businessUse').textContent = `${((settings.business_use_pct || 0) * 100).toFixed(2)}%`;
      document.getElementById('squareFeet').textContent = `${settings.office_sq_ft || 0} / ${settings.total_home_sq_ft || 0} sq ft`;
      document.getElementById('mileageRate').textContent = `$${Number(settings.mileage_rate || 0).toFixed(3)}`;
      document.getElementById('loggedMonths').textContent = months.length.toLocaleString('en-US');
      document.getElementById('latestMonth').textContent = months.length ? `Through ${monthLabel(months.at(-1).month)}` : 'Waiting for entries';

      const categories = Object.keys(data.categories || {});
      document.getElementById('summaryHead').innerHTML = `<tr><th>Month</th>${categories.map(key => `<th>${data.categories[key]}</th>`).join('')}<th>Indirect</th><th>Direct</th><th>Mileage</th><th>Total</th><th>Status</th></tr>`;
      document.getElementById('summaryBody').innerHTML = [...months].reverse().map(row => {
        const isCurrent = row.month === currentMonth ? ' class="current"' : '';
        const catCells = categories.map(key => `<td>${money.format(row.indirect[key].reimbursable)}</td>`).join('');
        const status = row.pending_categories.length ? `<span class="pending">${row.pending_categories.length} pending</span>` : 'Complete';
        return `<tr${isCurrent}><td>${monthLabel(row.month)}</td>${catCells}<td>${money.format(row.indirect_reimbursable)}</td><td>${money.format(row.direct_expenses)}</td><td>${money.format(row.mileage_reimbursement)}</td><td class="total">${money.format(row.total_reimbursement)}</td><td>${status}</td></tr>`;
      }).join('');

      if (current) renderReport(current, data.categories);
      document.getElementById('dataFooter').textContent = months.length ? `Live accountable plan data through ${monthLabel(months.at(-1).month)}` : 'No accountable plan entries yet';
    }

    function renderReport(row, categories) {
      const itemRows = (items, cols, empty) => items.length ? items.map(item => `<tr>${cols.map(col => `<td class="${col.money ? 'money' : ''}">${col.value(item)}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${cols.length}">${empty}</td></tr>`;
      const indirectRows = Object.keys(categories).map(key => `<tr><td>${categories[key]}</td><td class="money">${money.format(row.indirect[key].gross)}</td><td class="money">${money.format(row.indirect[key].reimbursable)}</td></tr>`).join('');
      document.getElementById('report').innerHTML = `
        <h1>MPEP Accountable Plan Reimbursement</h1>
        <div>${monthLabel(row.month)} · Business use ${((row.business_use_pct || 0) * 100).toFixed(2)}% · Mileage rate $${Number(row.mileage_rate || 0).toFixed(3)}/mi</div>
        <h2>Category subtotals</h2>
        <table><tbody>${indirectRows}<tr><th>Direct expenses</th><td></td><td class="money">${money.format(row.direct_expenses)}</td></tr><tr><th>Mileage</th><td></td><td class="money">${money.format(row.mileage_reimbursement)}</td></tr><tr><th>Total reimbursement</th><td></td><td class="money"><strong>${money.format(row.total_reimbursement)}</strong></td></tr></tbody></table>
        <h2>Repairs and maintenance</h2>
        <table><tbody>${itemRows(row.repairs, [{value:i=>i.date},{value:i=>i.description},{value:i=>money.format(i.amount), money:true}], 'No repairs logged for this month.')}</tbody></table>
        <h2>Direct expenses</h2>
        <table><tbody>${itemRows(row.direct_items, [{value:i=>i.date},{value:i=>i.description},{value:i=>money.format(i.amount), money:true}], 'No direct expenses logged for this month.')}</tbody></table>
        <h2>Mileage log</h2>
        <table><tbody>${itemRows(row.mileage_items, [{value:i=>i.date},{value:i=>i.destination},{value:i=>i.business_purpose},{value:i=>`${i.miles} mi @ $${Number(i.rate_used).toFixed(3)}`},{value:i=>money.format(i.reimbursement), money:true}], 'No mileage logged for this month.')}</tbody></table>`;
    }

    function printCurrentReport() {
      if (!state) return;
      const current = (state.months || []).find(row => row.month === currentMonth) || (state.months || []).at(-1);
      if (current) renderReport(current, state.categories || {});
      window.print();
    }
  </script>
  <script src="auth.js"></script>
</body>
</html>
